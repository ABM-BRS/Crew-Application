<!DOCTYPE html>
<html>
<head>
    <title>Airport Pickup Dispatch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 15px;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            font-size: 16px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .complete {
            background: #2e7d32;
        }

        .delete {
            background: #e53935;
        }

        .pickup-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .pickup-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .status {
            font-weight: bold;
            margin-top: 5px;
        }

        .pending {
            color: #f57c00;
        }

        .completed {
            color: #2e7d32;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .actions button {
            flex: 1;
        }

        .countdown {
            font-weight: bold;
            margin-top: 5px;
        }

        /* Highlight soon pickups (<30 min) */
        .urgent {
            border-left: 5px solid #f57c00;
        }

        /* Highlight pickups within 10 minutes */
        .imminent {
            border-left: 5px solid #e53935;
        }

        /* Highlight late pickups */
        .late {
            border-left: 5px solid #d32f2f;
            background: #ffe6e6;
        }
    </style>
</head>

<body>

<h1>Airport Pickup Dispatch</h1>

<div class="card">
    <h2>Confirm Pickup</h2>
    <input id="flight" placeholder="Flight Number">
    <select id="type" onchange="toggleStand()">
        <option value="Inbound">Inbound</option>
        <option value="Outbound">Outbound</option>
    </select>
    <input id="stand" placeholder="Stand / Pickup Location">
    <input type="datetime-local" id="time">
    <select id="crew">
        <option value="">Crew Number</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
    </select>
    <button onclick="confirmPickup()">Confirm Pickup</button>
</div>

<div class="card">
    <h2>Active Pickups</h2>
    <div id="dashboard"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCCehxMag_g2wXh7WzruvZyt9kdSJI4OpI",
    authDomain: "crew-app-e1315.firebaseapp.com",
    projectId: "crew-app-e1315",
    storageBucket: "crew-app-e1315.firebasestorage.app",
    messagingSenderId: "320647227664",
    appId: "1:320647227664:web:8de65c96c509d819a7dd95",
    databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups1");
const dashboard = document.getElementById("dashboard");

window.toggleStand = function () {
    const type = document.getElementById("type").value;
    document.getElementById("stand").style.display = type === "Inbound" ? "block" : "none";
};
toggleStand();

window.confirmPickup = async function () {
    const flight = document.getElementById("flight").value.trim();
    const type = document.getElementById("type").value;
    const stand = document.getElementById("stand").value.trim();
    const time = document.getElementById("time").value;
    const crew = document.getElementById("crew").value;

    if (!flight || !time || !crew) { alert("Enter flight, time and crew"); return; }
    if (type === "Inbound" && !stand) { alert("Enter stand for inbound"); return; }

    await push(pickupsRef, {
        flightNumber: flight,
        type: type,
        stand: stand,
        pickupTime: new Date(time).toISOString(),
        crew: crew,
        status: "Pending",
        createdTime: new Date().toISOString(),
        completedTime: null
    });

    document.getElementById("flight").value = "";
    document.getElementById("stand").value = "";
    document.getElementById("time").value = "";
    document.getElementById("crew").value = "";
}

window.complete = async function (id) {
    await update(ref(db, "pickups1/" + id), { status: "Completed", completedTime: new Date().toISOString() });
}

window.removePickup = async function (id) {
    await remove(ref(db, "pickups1/" + id));
}

function renderDashboard(pickups) {
    dashboard.innerHTML = "";

    const now = new Date();

    // Add computed properties for sorting
    pickups.forEach(p => {
        p.pickupDate = new Date(p.pickupTime);
        const diffMinutes = Math.floor((p.pickupDate - now)/60000);
        p.diffMinutes = diffMinutes;
        if (p.status !== "Pending") p.priority = 4;
        else if (diffMinutes < 0) p.priority = 0; // late
        else if (diffMinutes <= 10) p.priority = 1; // imminent
        else if (diffMinutes <= 30) p.priority = 2; // urgent
        else p.priority = 3; // normal pending
    });

    // Sort by priority then pickup time
    pickups.sort((a,b) => a.priority - b.priority || a.pickupDate - b.pickupDate);

    pickups.forEach(p => {
        const card = document.createElement("div");
        card.className = "pickup-card";
        card.dataset.pickupTime = p.pickupTime;
        card.dataset.status = p.status;

        card.innerHTML = `
            <div class="pickup-header">${p.flightNumber}</div>
            <div>${p.type}${p.stand ? " – Stand "+p.stand : ""}</div>
            <div class="pickup-time">Pickup: ${p.pickupDate.toLocaleString()}</div>
            <div>Crew: ${p.crew}</div>
            <div class="status ${p.status==="Completed"?"completed":"pending"}">${p.status}</div>
            <div class="countdown"></div>
            <div class="actions">
                ${p.status==="Pending"?`<button class="complete" onclick="complete('${p.id}')">Complete</button>`:""}
                <button class="delete" onclick="removePickup('${p.id}')">Delete</button>
            </div>
        `;
        dashboard.appendChild(card);
    });

    updateCountdowns();
}

onValue(pickupsRef, snapshot => {
    const pickups = [];
    snapshot.forEach(child => pickups.push({id: child.key, ...child.val()}));
    renderDashboard(pickups);
});

function updateCountdowns() {
    const cards = Array.from(document.getElementsByClassName("pickup-card"));
    const now = new Date();

    cards.forEach(card => {
        const status = card.dataset.status;
        const countdownEl = card.querySelector(".countdown");
        const pickupTime = new Date(card.dataset.pickupTime);

        if(status !== "Pending") {
            countdownEl.textContent = "";
            card.classList.remove("imminent","urgent","late");
            return;
        }

        let diffSeconds = Math.floor((pickupTime - now)/1000);

        if(diffSeconds < 0) {
            countdownEl.textContent = "Late!";
            card.classList.remove("imminent","urgent");
            card.classList.add("late");
        } else {
            const minutes = Math.floor(diffSeconds/60);
            const seconds = diffSeconds % 60;
            countdownEl.textContent = `Time left: ${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')} min`;
            card.classList.remove("imminent","urgent","late");
            if(minutes <= 10) card.classList.add("imminent");
            else if(minutes <= 30) card.classList.add("urgent");
        }
    });
}

// Live countdown update every second
setInterval(updateCountdowns, 1000);
</script>

</body>
</html>
