<!DOCTYPE html>
<html>
<head>
    <title>Airport Pickup Dispatch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        body { font-family: Arial; background: #f4f6f8; padding: 15px; max-width: 900px; margin: auto; }
        h1 { text-align: center; }
        .card { background: white; padding: 18px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        label { font-weight: bold; display:block; margin-top:10px; }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; font-size: 16px; }
        button { background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .complete { background: #2e7d32; }
        .delete { background: #e53935; }
        .pickup-card { background:white; padding:15px; border-radius:8px; margin-bottom:15px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
        .pickup-header { font-size: 20px; font-weight: bold; }
        .status.pending { color:#f57c00; }
        .status.completed { color:#2e7d32; }
        .actions { display:flex; gap:10px; margin-top:10px; }
        .countdown { font-weight: bold; }
        .urgent { border-left:5px solid orange; }
        .imminent { border-left:5px solid red; }
        .late { background:#ffe6e6; border-left:5px solid darkred; }
    </style>
</head>

<body>

<h1>Airport Pickup Dispatch</h1>

<div class="card">
    <h2>Confirm Pickup</h2>

    <label>Type</label>
    <select id="type" onchange="toggleStand()">
        <option>Inbound</option>
        <option>Outbound</option>
    </select>

    <label>Flight Number</label>
    <input id="flight">

    <label>Stand / Location</label>
    <input id="stand">

    <label>Date & Time</label>
    <input type="datetime-local" id="time">

    <label>Crew</label>
    <select id="crew">
        <option value="">Select</option>
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5</option><option>6</option>
    </select>

    <button onclick="confirmPickup()">Confirm Pickup</button>
</div>

<div class="card">
    <h2>Active Pickups (Last 24h)</h2>
    <div id="dashboard"></div>
</div>

<audio id="alertSound" src="alert.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "crew-app-e1315.firebaseapp.com",
    databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups1");

const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxx1Vwrj2TEcVNXCany1KNr24JbLKbXViESj9wxRZ3-iHpKKxZqUpFdbyQXzAF5DfThGA/exec";

// --- Helpers ---
window.toggleStand = function () {
    document.getElementById("stand").style.display =
        document.getElementById("type").value === "Inbound" ? "block" : "none";
};
toggleStand();

// --- Confirm Pickup ---
window.confirmPickup = async function () {

    const newJob = {
        flightNumber: flight.value,
        type: type.value,
        stand: stand.value,
        pickupTime: new Date(time.value).toISOString(),
        crew: crew.value,
        status: "Pending",
        createdTime: new Date().toISOString(),
        completedTime: ""
    };

    const jobRef = await push(pickupsRef, newJob);

    // ✅ SEND TO GOOGLE SHEETS (FIXED)
    try {
        await fetch(SHEETS_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: jobRef.key, ...newJob })
        });
        console.log("Saved to Google Sheets ✅");
    } catch (e) {
        console.error("Sheets error ❌", e);
    }

    flight.value = stand.value = time.value = crew.value = "";
};

// --- Complete ---
window.complete = async function (id) {
    const updateData = {
        status: "Completed",
        completedTime: new Date().toISOString()
    };

    await update(ref(db, "pickups1/" + id), updateData);

    await fetch(SHEETS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, ...updateData })
    });
};

// --- Delete ---
window.removePickup = async function (id) {
    await remove(ref(db, "pickups1/" + id));

    await fetch(SHEETS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, status: "Deleted" })
    });
};

// --- Load last 24h jobs ---
onValue(pickupsRef, snap => {
    const now = new Date();
    const list = [];

    snap.forEach(c => {
        const d = { id: c.key, ...c.val() };
        if (now - new Date(d.createdTime) <= 86400000) list.push(d);
    });

    dashboard.innerHTML = "";

    list.forEach(p => {
        const div = document.createElement("div");
        div.className = "pickup-card";
        div.innerHTML = `
            <div class="pickup-header">${p.flightNumber}</div>
            <div>${p.type} ${p.stand}</div>
            <div>${new Date(p.pickupTime).toLocaleString()}</div>
            <div>Crew: ${p.crew}</div>
            <div class="status ${p.status.toLowerCase()}">${p.status}</div>
            <div class="actions">
                ${p.status === "Pending" ? `<button class="complete" onclick="complete('${p.id}')">Complete</button>` : ""}
                <button class="delete" onclick="removePickup('${p.id}')">Delete</button>
            </div>
        `;
        dashboard.appendChild(div);
    });
});
</script>

</body>
</html>
