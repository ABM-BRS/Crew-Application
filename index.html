<!DOCTYPE html>
<html>
<head>
    <title>Airport Pickup Dispatch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #f4f6f8; padding: 15px; max-width: 900px; margin: auto; }
        h1 { text-align: center; }
        .card { background: white; padding: 18px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        label { font-weight: bold; display:block; margin-top:10px; }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; font-size: 16px; }
        button { background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .complete { background: #2e7d32; }
        .delete { background: #e53935; }
        .pickup-card { background:white; padding:15px; border-radius:8px; margin-bottom:15px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
        .pickup-header { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
        .status { font-weight: bold; margin-top: 5px; }
        .pending { color: #f57c00; }
        .completed { color: #2e7d32; }
        .actions { display:flex; gap:10px; margin-top:10px; }
        .actions button { flex:1; }
        .countdown { font-weight: bold; margin-top:5px; }
        .urgent { border-left:5px solid #f57c00; }
        .imminent { border-left:5px solid #e53935; }
        .late { border-left:5px solid #d32f2f; background: #ffe6e6; }
    </style>
</head>

<body>
<h1>Airport Pickup Dispatch</h1>

<div class="card">
    <h2>Confirm Pickup</h2>

    <label>Type</label>
    <select id="type" onchange="toggleStand()">
        <option value="Inbound">Inbound</option>
        <option value="Outbound">Outbound</option>
    </select>

    <label>Flight Number</label>
    <input id="flight">

    <label id="standLabel">Stand / Pickup Location</label>
    <input id="stand">

    <label>Date and Time</label>
    <input type="datetime-local" id="time">

    <label>Crew</label>
    <select id="crew">
        <option value="">Select</option>
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5</option><option>6</option>
    </select>

    <button onclick="confirmPickup()">Confirm Pickup</button>
</div>

<div class="card">
    <h2>Active Pickups</h2>
    <div id="dashboard"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCC...",
    authDomain: "crew-app-e1315.firebaseapp.com",
    databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups1");

const dashboard = document.getElementById("dashboard");

// Toggle stand
window.toggleStand = function() {
    const type = document.getElementById("type").value;
    document.getElementById("stand").style.display = type === "Inbound" ? "block" : "none";
};
toggleStand();

// Confirm pickup
window.confirmPickup = async function() {
    const flight = document.getElementById("flight").value.trim();
    const type = document.getElementById("type").value;
    const stand = document.getElementById("stand").value.trim();
    const time = document.getElementById("time").value;
    const crew = document.getElementById("crew").value;

    if (!flight || !time || !crew) {
        alert("Fill all required fields");
        return;
    }

    if (type === "Inbound" && !stand) {
        alert("Enter stand");
        return;
    }

    const newJob = {
        flightNumber: flight,
        type,
        stand,
        pickupTime: time, // ✅ SAFE FIX (NO ISO CONVERSION)
        crew,
        status: "Pending",
        createdTime: Date.now()
    };

    await push(pickupsRef, newJob);

    document.getElementById("flight").value = "";
    document.getElementById("stand").value = "";
    document.getElementById("time").value = "";
    document.getElementById("crew").value = "";
};

// Complete
window.complete = function(id) {
    update(ref(db, "pickups1/" + id), {
        status: "Completed"
    });
};

// Delete
window.removePickup = function(id) {
    if (confirm("Delete this job?")) {
        remove(ref(db, "pickups1/" + id));
    }
};

// Render
onValue(pickupsRef, snapshot => {
    dashboard.innerHTML = "";

    snapshot.forEach(child => {
        const p = child.val();
        const id = child.key;

        const card = document.createElement("div");
        card.className = "pickup-card";

        const pickupDate = new Date(p.pickupTime);

        const now = new Date();
        const diff = (pickupDate - now) / 60000;

        if (diff <= 10 && diff >= 0) card.classList.add("imminent");
        else if (diff <= 30 && diff > 10) card.classList.add("urgent");
        else if (diff < 0) card.classList.add("late");

        card.innerHTML = `
            <div class="pickup-header">${p.flightNumber}</div>
            <div>${p.type} ${p.stand ? "- " + p.stand : ""}</div>
            <div>${pickupDate.toLocaleString()}</div>
            <div>Crew: ${p.crew}</div>
            <div class="status ${p.status==="Completed"?"completed":"pending"}">${p.status}</div>

            <div class="actions">
                ${p.status==="Pending" ? `<button class="complete" onclick="complete('${id}')">Complete</button>` : ""}
                <button class="delete" onclick="removePickup('${id}')">Delete</button>
            </div>
        `;

        dashboard.appendChild(card);
    });
});
</script>
</body>
</html>
