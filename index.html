<!DOCTYPE html>
<html>
<head>
    <title>Airport Pickup Dispatch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">

    <style>
        body { font-family: Arial; background: #f4f6f8; padding: 15px; max-width: 900px; margin: auto; }
        h1 { text-align: center; }
        .card { background: white; padding: 18px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; font-size: 16px; }
        button { background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .complete { background: #2e7d32; }
        .delete { background: #e53935; }
        .pickup-card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
        .pickup-header { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
        .status { font-weight: bold; margin-top: 5px; }
        .pending { color: #f57c00; }
        .completed { color: #2e7d32; }
        .actions { display:flex; gap:10px; margin-top:10px; }
        .actions button { flex:1; }
        .countdown { font-weight: bold; margin-top:5px; }
        .late { background: #ffe6e6; animation: blink 1s infinite; }
        @keyframes blink { 0% { background:#ffe6e6;} 50% { background:#ffcccc;} 100% { background:#ffe6e6;} }
    </style>
</head>

<body>

<h1>Airport Pickup Dispatch</h1>

<div class="card">
    <h2>Confirm Pickup</h2>
    <input id="flight" placeholder="Flight Number">
    <select id="type" onchange="toggleStand()">
        <option value="Inbound">Inbound</option>
        <option value="Outbound">Outbound</option>
    </select>
    <input id="stand" placeholder="Stand / Pickup Location">
    <input type="datetime-local" id="time">
    <select id="crew">
        <option value="">Crew Number</option>
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5</option><option>6</option>
    </select>
    <button onclick="confirmPickup()">Confirm Pickup</button>
</div>

<div class="card">
    <h2>Active Pickups</h2>

    <button onclick="resetAlerts()" style="background:#ff9800;">Reset Alerts</button>

    <!-- ✅ INSTALL BUTTON -->
    <button id="installBtn" style="background:#4caf50; display:none; margin-top:10px;">
        Install App
    </button>

    <div id="dashboard"></div>
</div>

<audio id="alertSound" src="alert.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "crew-app-e1315.firebaseapp.com",
    databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups1");
const dashboard = document.getElementById("dashboard");
const alertSound = document.getElementById("alertSound");

window.toggleStand = () => {
    document.getElementById("stand").style.display =
        document.getElementById("type").value === "Inbound" ? "block" : "none";
};
toggleStand();

window.confirmPickup = async () => {
    const flight = flight.value.trim();
    const type = type.value;
    const standVal = stand.value.trim();
    const timeVal = time.value;
    const crewVal = crew.value;

    if (!flight || !timeVal || !crewVal) return alert("Fill required fields");

    await push(pickupsRef, {
        flightNumber: flight,
        type,
        stand: standVal,
        pickupTime: new Date(timeVal).toISOString(),
        crew: crewVal,
        status: "Pending"
    });

    document.querySelectorAll("input,select").forEach(e => e.value="");
};

window.complete = id => update(ref(db,"pickups1/"+id),{status:"Completed"});
window.removePickup = id => remove(ref(db,"pickups1/"+id));

window.resetAlerts = () => {
    alertSound.pause();
    alertSound.currentTime = 0;
};

onValue(pickupsRef, snap => {
    dashboard.innerHTML = "";
    snap.forEach(c => {
        const p = c.val();
        const card = document.createElement("div");
        card.className="pickup-card";
        card.dataset.time=p.pickupTime;
        card.dataset.status=p.status;

        card.innerHTML = `
            <div class="pickup-header">${p.flightNumber}</div>
            <div>${p.type}</div>
            <div>Crew: ${p.crew}</div>
            <div class="status">${p.status}</div>
            <div class="countdown"></div>
            <div class="actions">
                ${p.status==="Pending"?`<button onclick="complete('${c.key}')">Complete</button>`:""}
                <button onclick="removePickup('${c.key}')">Delete</button>
            </div>
        `;
        dashboard.appendChild(card);
    });
    updateCountdowns();
});

function updateCountdowns(){
    document.querySelectorAll(".pickup-card").forEach(card=>{
        const diff=(new Date(card.dataset.time)-new Date())/1000;
        const cd=card.querySelector(".countdown");

        if(card.dataset.status!=="Pending") return cd.textContent="";

        if(diff<0){
            cd.textContent="Late!";
            card.classList.add("late");
            alertSound.play().catch(()=>{});
        }else{
            cd.textContent=`${Math.floor(diff/60)}m ${Math.floor(diff%60)}s`;
            card.classList.remove("late");
        }
    });
}
setInterval(updateCountdowns,1000);


// ✅ INSTALL APP LOGIC
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const btn = document.getElementById("installBtn");
    btn.style.display = "block";

    btn.onclick = async () => {
        btn.style.display = "none";
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
    };
});


// ✅ SERVICE WORKER REGISTER
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
